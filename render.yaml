services:
  # 1. Next.js Frontend + Socket.io Server
  - type: web
    name: collabboard-web
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_COLLAB_PLUS
        value: "true"
      - key: COLLAB_API_URL
        fromService:
          type: web
          name: collabboard-api
          property: host
      - key: REDIS_URL
        fromService:
          type: redis
          name: collabboard-redis
          property: connectionString
      # The following must be set manually in Render UI or filled before deploying
      - key: NEXT_PUBLIC_FIREBASE_API_KEY
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  # 2. NestJS API Service
  - type: web
    name: collabboard-api
    env: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: API_PORT
        value: 4000
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: collabboard-web
          property: host
      - key: DATABASE_URL
        fromDatabase:
          name: collabboard-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: collabboard-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false

# 3. Managed PostgreSQL Database
databases:
  - name: collabboard-db
    plan: free

# 4. Managed Redis Instance
redis:
  - name: collabboard-redis
    plan: free
