apiVersion: apps/v1
kind: Deployment
metadata:
  name: collabboard-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: collabboard-api
  template:
    metadata:
      labels:
        app: collabboard-api
    spec:
      containers:
        - name: api
          image: collabboard/api:latest
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: collabboard-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: collabboard-api
spec:
  selector:
    app: collabboard-api
  ports:
    - port: 4000
